<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PayApp">
    
    <title>PayApp Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ppBlue: '#001c64',     // Adjusted to match typical dark logo background
                        ppLightBlue: '#0070ba', // Main brand blue
                        ppDarkBlue: '#003087',
                        ppBg: '#f4f6f8',      // Off-white background
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    boxShadow: {
                        'nav': '0 -4px 20px rgba(0,0,0,0.05)',
                        'card': '0 4px 15px rgba(0,0,0,0.03)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-color: #f4f6f8;
        }

        /* Utility Transitions */
        .fade-transition {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        }
        
        .hide-screen {
            opacity: 0 !important;
            pointer-events: none;
            z-index: -1;
        }

        /* Loading Spinner */
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Hide scrollbar for horizontal scrolling containers */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Face ID Animations */
        #face-id-success {
            transform: scale(0.5);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #face-id-success.active {
            transform: scale(1);
            opacity: 1;
        }
        #face-id-default {
            transition: opacity 0.3s ease-out;
        }
        
        /* Spherical Scanning Animation overlay */
        .scan-ring {
            border-radius: 30px;
            border: 4px solid transparent;
            border-top-color: #0070ba;
            border-bottom-color: #0070ba;
            animation: spherical-scan 1s linear infinite, pulse-glow 1s ease-in-out infinite alternate;
        }
        
        @keyframes spherical-scan {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(0, 112, 186, 0.2) inset; }
            100% { box-shadow: 0 0 20px rgba(0, 112, 186, 0.6) inset; }
        }
    </style>
</head>
<body class="w-screen h-[100dvh] overflow-hidden relative text-black">

    <!-- ================= 1. BLUE SPLASH SCREEN ================= -->
    <div id="screen-splash" class="absolute inset-0 flex flex-col items-center justify-center bg-[#001c64] z-50 fade-transition">
        <!-- Using directly uploaded logo image -->
        <img src="image_a5507e.png" alt="PayPal Logo" class="w-[140px] object-contain">
    </div>

    <!-- ================= 2. LOADING SCREEN ================= -->
    <div id="screen-loading" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-40 opacity-0 pointer-events-none fade-transition">
        <div class="spinner"></div>
    </div>

    <!-- ================= 3. FACE ID SCREEN ================= -->
    <div id="screen-faceid" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-30 opacity-0 pointer-events-none fade-transition">
        <!-- iOS Style Face ID Box with Animation Container -->
        <div class="relative w-[150px] h-[150px] flex items-center justify-center">
            
            <!-- Default Face ID Image Uploaded -->
            <img id="face-id-default" src="image_a4f661.png" alt="Face ID" class="absolute w-full h-full object-contain z-10 rounded-[28px] shadow-sm">

            <!-- Scanning Spherical Animation Ring (Hidden initially) -->
            <div id="face-id-scan" class="scan-ring absolute w-[158px] h-[158px] z-20 opacity-0 transition-opacity duration-300"></div>

            <!-- Success Green Checkmark -->
            <div id="face-id-success" class="absolute flex items-center justify-center w-full h-full z-30 bg-[#f0f0f0] rounded-[28px]">
                <div class="w-16 h-16 rounded-full flex items-center justify-center bg-white shadow-sm">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#34C759" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
            </div>
            
        </div>
    </div>

    <!-- ================= 4. HOME PAGE (Main App) ================= -->
    <div id="screen-home" class="absolute inset-0 bg-ppBg z-10 flex flex-col opacity-0 pointer-events-none fade-transition overflow-y-auto overflow-x-hidden pb-28">
        
        <!-- Header -->
        <header class="flex justify-between items-center px-5 pt-12 pb-4 sticky top-0 bg-ppBg/90 backdrop-blur-md z-20">
            <!-- Menu Button -->
            <button class="w-11 h-11 rounded-full bg-white border border-gray-200 flex items-center justify-center text-ppLightBlue shadow-sm">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="4" y1="12" x2="20" y2="12"></line>
                    <line x1="4" y1="6" x2="20" y2="6"></line>
                    <line x1="4" y1="18" x2="20" y2="18"></line>
                </svg>
            </button>
            
            <div class="flex gap-3">
                <!-- Notifications -->
                <button class="w-11 h-11 rounded-full bg-white border border-gray-200 flex items-center justify-center text-ppLightBlue shadow-sm relative">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </button>
                <!-- Profile -->
                <button class="w-11 h-11 rounded-full bg-white border border-gray-200 flex items-center justify-center text-ppLightBlue shadow-sm">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 flex flex-col gap-4 px-5 pt-2">
            
            <!-- Cards Carousel -->
            <div class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar -mx-5 px-5 gap-4">
                <!-- Main Balance Card -->
                <div class="snap-center shrink-0 w-[85vw] max-w-[340px] bg-white rounded-3xl shadow-card overflow-hidden flex flex-col border border-gray-100">
                    <!-- Top (White) -->
                    <div class="p-5 pb-8 flex flex-col">
                        <div class="flex items-center gap-2 mb-6">
                            <!-- Small PP Logo -->
                            <div class="text-ppLightBlue">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944 3.72a.641.641 0 0 1 .633-.535h6.924c2.616 0 4.673.497 5.86 1.488 1.48 1.238 2.052 3.327 1.637 5.961-.758 4.81-4.041 7.215-8.583 7.215h-1.92a.641.641 0 0 0-.633.535l-.946 5.97a.641.641 0 0 1-.633.535l-.207-1.017Z"/>
                                </svg>
                            </div>
                            <span class="font-medium text-[15px] text-black">PayPal balance</span>
                        </div>
                        <h2 class="text-4xl font-extrabold tracking-tight">£0.15</h2>
                    </div>
                    <!-- Bottom (Blue) -->
                    <div class="bg-[#005ea6] p-4 px-5 flex items-center justify-between text-white active:bg-[#004e8a] transition cursor-pointer">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded bg-white/20 flex items-center justify-center">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                                    <circle cx="12" cy="12" r="2"></circle>
                                    <path d="M6 12h.01M18 12h.01"></path>
                                </svg>
                            </div>
                            <div class="flex flex-col">
                                <span class="font-semibold text-[15px]">Add money</span>
                                <span class="text-[12px] text-blue-100 font-medium mt-0.5">Spend it online or in shops</span>
                            </div>
                        </div>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </div>
                </div>

                <!-- Secondary Card (Credit Placeholder) -->
                <div class="snap-center shrink-0 w-[85vw] max-w-[340px] bg-white rounded-3xl shadow-card p-5 border border-gray-100 flex flex-col">
                    <span class="font-medium text-[15px] mb-2 text-black">PayPal Credit</span>
                    <h3 class="text-[20px] font-bold mb-1">Apply and get a decision in seconds</h3>
                    <p class="text-[13px] text-gray-500">Representative 23.9% APR (variable)</p>
                    <div class="mt-auto h-16 w-32 border-4 border-[#0070ba] rounded-full border-b-transparent border-r-transparent transform -rotate-45 relative -left-4 top-4"></div>
                </div>
            </div>

            <!-- Recent Activity Widget -->
            <div class="bg-white rounded-[24px] p-5 flex items-center justify-between shadow-card border border-gray-100 mt-1">
                <div class="flex flex-col">
                    <span class="text-[13px] text-gray-500 font-medium mb-1">Recent activity</span>
                    <span class="text-[22px] font-bold text-black">2</span>
                </div>
                <!-- Overlapping Avatars -->
                <div class="flex -space-x-3">
                    <div class="w-10 h-10 rounded-full bg-[#1A1A1A] text-white flex items-center justify-center font-bold text-[15px] border-2 border-white relative z-10 shadow-sm">
                        K
                    </div>
                    <div class="w-10 h-10 rounded-full bg-ppLightBlue text-white flex items-center justify-center border-2 border-white relative z-20 shadow-sm">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2L2 7l1 2h18l1-2-10-5zM4 10v9h2v-9H4zm6 0v9h2v-9h-2zm6 0v9h2v-9h-2zM2 20v2h20v-2H2z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Promo Banner (Using Uploaded Image) -->
            <div class="mt-1">
                <img src="image_a4eb7f.jpg" alt="PayPal+ Rewards" class="w-full rounded-[24px] shadow-sm object-contain border border-gray-100">
            </div>

            <!-- Horizontal Offers (Large Uploaded Ads) -->
            <div class="flex gap-4 overflow-x-auto snap-x snap-mandatory hide-scrollbar -mx-5 px-5 mt-2">
                <!-- Just Eat Ad -->
                <div class="w-[85vw] max-w-[350px] shrink-0 snap-center rounded-[24px] overflow-hidden shadow-sm border border-gray-100">
                    <img src="image_a48a1f.jpg" alt="Just Eat Offer" class="w-full h-auto object-cover block">
                </div>
                
                <!-- ASOS Ad -->
                <div class="w-[85vw] max-w-[350px] shrink-0 snap-center rounded-[24px] overflow-hidden shadow-sm border border-gray-100">
                    <img src="image_a489c4.jpg" alt="ASOS Offer" class="w-full h-auto object-cover block">
                </div>
            </div>
            
            <div class="h-8"></div> <!-- Scroll Spacer -->
        </div>

        <!-- Bottom Navigation Bar -->
        <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 shadow-[0_-10px_30px_rgba(0,0,0,0.03)] px-2 pb-6 pt-3 flex justify-around items-end z-30">
            <!-- Home (Active) -->
            <div class="flex flex-col items-center gap-1 cursor-pointer">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="black" stroke="black" stroke-width="1.5" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span class="text-[11px] font-bold text-black">Home</span>
            </div>

            <!-- Accounts -->
            <div class="flex flex-col items-center gap-1 cursor-pointer opacity-60">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span class="text-[11px] font-medium text-black">Accounts</span>
            </div>

            <!-- Send/Request (Raised Center Button) -->
            <div class="flex flex-col items-center cursor-pointer relative">
                <div class="absolute bottom-[22px] w-[56px] h-[56px] bg-[#005ea6] rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="20" x2="21" y2="3"></line>
                        <polyline points="21 16 21 21 16 21"></polyline>
                        <line x1="15" y1="15" x2="21" y2="21"></line>
                        <line x1="4" y1="4" x2="9" y2="9"></line>
                    </svg>
                </div>
                <span class="text-[11px] font-medium text-black mt-2">Send/Request</span>
            </div>

            <!-- Activity -->
            <div class="flex flex-col items-center gap-1 cursor-pointer opacity-60">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    <line x1="8" y1="10" x2="16" y2="10"></line>
                    <line x1="8" y1="14" x2="16" y2="14"></line>
                </svg>
                <span class="text-[11px] font-medium text-black">Activity</span>
            </div>

            <!-- PayPal+ -->
            <div class="flex flex-col items-center gap-1 cursor-pointer opacity-60">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 21h8"></path>
                    <path d="M12 17v4"></path>
                    <path d="M7 4h10"></path>
                    <path d="M17 4v8a5 5 0 0 1-10 0V4"></path>
                    <path d="M7 5H4a2 2 0 0 0-2 2v2a5 5 0 0 0 5 5h0"></path>
                    <path d="M17 5h3a2 2 0 0 1 2 2v2a5 5 0 0 1-5 5h0"></path>
                </svg>
                <span class="text-[11px] font-medium text-black">PayPal+</span>
            </div>
        </nav>
    </div>

    <!-- Application Logic (Timers) -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const screenSplash = document.getElementById('screen-splash');
            const screenLoading = document.getElementById('screen-loading');
            const screenFaceId = document.getElementById('screen-faceid');
            const screenHome = document.getElementById('screen-home');
            
            const faceIdDefault = document.getElementById('face-id-default');
            const faceIdScanRing = document.getElementById('face-id-scan');
            const faceIdSuccess = document.getElementById('face-id-success');

            // 1. Splash stays for 0.5s, then show Loading
            setTimeout(() => {
                screenSplash.classList.add('hide-screen');
                screenLoading.classList.remove('opacity-0', 'pointer-events-none');
                
                // 2. Loading stays for 0.8s, then show Face ID
                setTimeout(() => {
                    screenLoading.classList.add('hide-screen');
                    screenFaceId.classList.remove('opacity-0', 'pointer-events-none');
                    
                    // 3. Start Face ID "Scanning" Animation
                    setTimeout(() => {
                        faceIdScanRing.classList.remove('opacity-0');
                        
                        // 4. Stop scanning, trigger Success Mark after 1.2s
                        setTimeout(() => {
                            faceIdScanRing.classList.add('opacity-0');
                            faceIdDefault.classList.add('opacity-0');
                            faceIdSuccess.classList.add('active');
                            
                            // 5. Success shows for 0.8s, then transition to Home Page
                            setTimeout(() => {
                                screenFaceId.classList.add('hide-screen');
                                screenHome.classList.remove('opacity-0', 'pointer-events-none');
                                
                                // Reset scroll position to top
                                screenHome.scrollTo(0, 0);
                            }, 800);

                        }, 1200);

                    }, 200); // Tiny delay before scanning starts for smoothness

                }, 800);

            }, 500);
        });
    </script>
</body>
</html>
